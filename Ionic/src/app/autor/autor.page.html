<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Autores</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Buscador -->
  <div class="search-container">
    <ion-searchbar
      placeholder="Buscar autor por nombre"
      (ionInput)="filtrarAutores($event)"
      class="custom-searchbar"
    ></ion-searchbar>
  </div>

  <!-- Lista de autores -->
  <ion-list class="author-list">
    <ion-item
      *ngFor="let a of autoresFiltrados"
      [routerLink]="['/detalle-autor', a.IdAutor]"
      class="author-item"
      detail
    >
      <div slot="start" class="author-avatar">
        <span>{{ a.Nombre.charAt(0) }}</span>
      </div>
      <ion-label>
        <h2>{{ a.Nombre }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
