<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Buscador -->
  <div class="search-container">
    <ion-searchbar
      placeholder="Buscar usuario por nombre"
      (ionInput)="filtrarUsuarios($event)"
      class="custom-searchbar"
    ></ion-searchbar>
  </div>

  <!-- Lista de usuarios -->
  <ion-list class="user-list">
    <ion-item
      *ngFor="let u of usuariosFiltrados"
      [routerLink]="['/detalle-usuario', u.IdUsuario]"
      class="user-item"
      detail
    >
      <ion-icon slot="start" name="person-outline" class="user-icon"></ion-icon>
      <ion-label>
        <h2>{{ u.Nombre }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
