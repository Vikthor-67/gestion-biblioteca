<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Detalle del Autor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="autor">
  <div class="autor-detalle">
    <h1>{{ autor.Nombre }}</h1>

    <div class="info-item">
      <span class="label">NACIONALIDAD</span>
      <span class="value">{{ autor.Nacionalidad }}</span>
    </div>
  </div>
</ion-content>
