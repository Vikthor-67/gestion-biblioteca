<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Detalle del Libro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="libro">
  <div class="book-detalle">
    <!-- Icono grande de libro -->
    <div class="book-icon-large">
      <ion-icon name="book-outline"></ion-icon>
    </div>

    <h1>{{ libro.Titulo }}</h1>

    <div class="info-item">
      <span class="label">AÑO DE PUBLICACIÓN</span>
      <span class="value">{{ libro.AnioPublicacion }}</span>
    </div>

    <div class="info-item">
      <span class="label">GÉNERO</span>
      <span class="value">{{ libro.Genero }}</span>
    </div>

    <div class="info-item">
      <span class="label">STOCK</span>
      <span class="value">{{ libro.Stock ?? 0 }}</span>
    </div>

    <div class="info-item">
      <span class="label">AUTOR</span>
      <span class="value">{{ libro.Autor }}</span>
    </div>

    <div class="info-item">
      <span class="label">NACIONALIDAD</span>
      <span class="value">{{ libro.Nacionalidad }}</span>
    </div>
  </div>
</ion-content>
