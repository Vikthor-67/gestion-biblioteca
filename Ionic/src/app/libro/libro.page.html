<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Libros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Buscador -->
  <div class="search-container">
    <ion-searchbar
      placeholder="Buscar libro por título"
      (ionInput)="filtrarLibros($event)"
      class="custom-searchbar"
    ></ion-searchbar>
  </div>

  <!-- Lista de libros -->
  <ion-list class="book-list">
    <ion-item
      *ngFor="let l of librosFiltrados"
      [routerLink]="['/detalle-libro', l.IdLibro]"
      class="book-item"
      detail
    >
      <ion-icon slot="start" name="book-outline" class="book-icon"></ion-icon>
      <ion-label>
        <h2>{{ l.Titulo }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
