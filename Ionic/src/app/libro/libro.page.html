<ion-header>
  <ion-toolbar>
    <ion-title>Libros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Buscador -->
  <ion-searchbar
    placeholder="Buscar libro por título"
    (ionInput)="filtrarLibros($event)">
  </ion-searchbar>

  <!-- Lista de libros -->
  <ion-list>
    <ion-item *ngFor="let l of librosFiltrados" [routerLink]="['/detalle-libro', l.IdLibro]">
      <ion-label>
        <h2>{{ l.Titulo }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
